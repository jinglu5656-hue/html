<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>淨律學佛院 最新消息</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans TC', sans-serif; background: transparent; color: #2a1f0e; padding: 0; font-size: 14px; }
.board-wrap { background: #fffdf8; border: 1px solid #d8c89a; border-radius: 6px; overflow: hidden; }
.board-header { background: linear-gradient(135deg, #2a3a10, #3a5018); padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; }
.board-header-title { font-family: 'Noto Serif TC', serif; font-size: 0.9rem; color: #d8f0a0; letter-spacing: 0.15em; }
.board-header-count { font-size: 0.7rem; color: #a8c870; }
.bulletin-list { max-height: 400px; overflow-y: auto; }
.bulletin-list::-webkit-scrollbar { width: 4px; }
.bulletin-list::-webkit-scrollbar-thumb { background: #c8a860; border-radius: 2px; }
.bulletin-item { border-bottom: 1px solid #efe5c8; cursor: pointer; transition: background 0.15s; }
.bulletin-item:last-child { border-bottom: none; }
.bulletin-item:hover { background: #fffbf0; }
.bulletin-row { display: flex; align-items: center; gap: 7px; padding: 8px 12px; }
.tag { flex-shrink: 0; font-size: 0.62rem; padding: 1px 5px; border-radius: 2px; white-space: nowrap; font-weight: 500; }
.tag-新   { background:#fff0b0; color:#7a4e00; border:1px solid #C9A84C; }
.tag-招生 { background:#e0eaff; color:#1a3a80; border:1px solid #7a9acc; }
.tag-課程 { background:#f0e0ff; color:#5a107a; border:1px solid #b070cc; }
.tag-法七 { background:#ffeee0; color:#7a3010; border:1px solid #cc8050; }
.tag-消息 { background:#e4f7e0; color:#1a5a18; border:1px solid #70bb60; }
.b-date { flex-shrink:0; font-size:0.72rem; color:#9a7848; min-width:80px; }
.b-title { flex:1; font-size:0.84rem; color:#2a1a08; line-height:1.4; }
.b-arrow { flex-shrink:0; font-size:0.65rem; color:#aa8840; transition:transform 0.25s; margin-left:4px; }
.bulletin-detail { display:none; padding:8px 12px 12px; border-top:1px dashed #ddd0a8; background:#fffcf5; font-size:0.8rem; color:#3a2810; line-height:1.95; }
.bulletin-detail.open { display:block; }
.bulletin-detail p { margin-bottom:3px; }
.bulletin-detail strong { color:#4a2e00; }
.bulletin-detail a { color:#7a5000; text-decoration:underline; }
.detail-img { margin-top:8px; width:100%; border-radius:4px; border:1px solid #ddd0a8; display:block; }
.contact-box { background:#f0ece0; border-top:1px solid #ddd0a8; padding:7px 12px; font-size:0.75rem; color:#6b4a10; line-height:1.8; }
.contact-box strong { color:#4a2e00; }
.board-footer { background:#f5edd8; border-top:1px solid #ddd0a8; padding:5px 12px; font-size:0.7rem; color:#9a7848; text-align:center; }
.loading { padding:20px; text-align:center; color:#9a7848; font-size:0.85rem; }
@media(max-width:480px){ .b-date{display:none;} }
</style>
</head>
<body>
<div class="board-wrap">
  <div class="board-header">
    <span class="board-header-title">☸ 淨律學佛院 最新消息</span>
    <span class="board-header-count" id="countLabel">載入中…</span>
  </div>
  <div class="bulletin-list" id="bulletinList"><div class="loading">公告載入中…</div></div>
  <div class="contact-box"><strong>聯絡本院：</strong>049-275-5656（上午 07:30～08:00 ／ 下午 12:00～12:30）｜ <strong>傳真：</strong>049-2753367</div>
  <div class="board-footer">點擊標題可展開詳細內容</div>
</div>
<script>
fetch('https://jinglu5656-hue.github.io/html/announcements.json?v='+Date.now())
  .then(r=>r.json())
  .then(all=>{
    const items=all.filter(b=>b.category==='institute').slice(0,10);
    document.getElementById('countLabel').textContent='最新 '+items.length+' 則';
    document.getElementById('bulletinList').innerHTML=items.map((b,i)=>`
      <div class="bulletin-item" onclick="toggle(${i})">
        <div class="bulletin-row">
          <span class="tag tag-${b.tag}">${b.tag}</span>
          <span class="b-date">${b.date}</span>
          <span class="b-title">${b.title}</span>
          <span class="b-arrow" id="arrow-${i}">▶</span>
        </div>
        <div class="bulletin-detail" id="detail-${i}">
          ${b.content}
          ${b.img?`<img class="detail-img" src="${b.img}" alt="公告圖片" loading="lazy">`:''}
        </div>
      </div>`).join('');
  })
  .catch(()=>{document.getElementById('bulletinList').innerHTML='<div class="loading">公告暫時無法載入，請稍後再試。</div>';});

function toggle(i){
  const d=document.getElementById('detail-'+i);
  const a=document.getElementById('arrow-'+i);
  const open=d.classList.contains('open');
  document.querySelectorAll('.bulletin-detail.open').forEach(x=>x.classList.remove('open'));
  document.querySelectorAll('.b-arrow').forEach(x=>x.style.transform='');
  if(!open){d.classList.add('open');a.style.transform='rotate(90deg)';}
}
</script>
</body>
</html>
